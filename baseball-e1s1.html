let ready = 0; sheet.onload = bg.onload = () => ready++;

function pitcherTopLeft(){ return { x: MOUND.x - SP.w/2, y: PITCHER_FEET_Y - SP.h }; }

function drawBackground(){
  if (!bg.complete) { ctx.fillStyle='#0a1018'; ctx.fillRect(0,0,W,H); return; }
  ctx.drawImage(bg, 0, 0, W, H);                 // 590x400 -> 700x475, aspect match
}

function drawPitcher(){
  // map elapsed wind-up time -> frame 1..138
  let f = Math.min(SP.n, Math.floor((tWind / WINDUP_DUR) * SP.n) + 1);
  if (STATE === 'SETTLE') f = SP.n;              // hold final follow-through pose
  const i = f - 1, sx = (i % SP.cols) * SP.w, sy = ((i / SP.cols) | 0) * SP.h;
  const p = pitcherTopLeft();
  ctx.drawImage(sheet, sx, sy, SP.w, SP.h, p.x, p.y, SP.w, SP.h);
}

function ballPos(t){
  // t in 0..1 from hand to plate. Near-linear descent so the travel reads
  // steadily across the whole flight (E1-S1: "time to react and aim"),
  // with a mild late acceleration for depth feel and a slight upward bow.
  const e = t * (0.78 + 0.22 * t);            // ~linear, gentle late accel
  const x = releaseAt.x + (PLATE.x - releaseAt.x) * t;
  const baseY = releaseAt.y + (PLATE.y - releaseAt.y) * e;
  const arc = -Math.sin(t * Math.PI) * 16;
  return { x, y: baseY + arc, r: 3 + 11 * Math.pow(t, 0.85) };
}

function drawBall(){
  if (!ballLive) return;
  const t = Math.min(1, tBall / BALL_DUR);
  const b = ballPos(t);
  // ground shadow on the dirt/grass below the ball
  const groundY = PLATE.y + 6;
  const sr = 3 + 9 * t;
  ctx.save();
  ctx.globalAlpha = 0.32;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(b.x, groundY, sr, sr*0.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // the ball (vector)
  const g = ctx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.1, b.x, b.y, b.r);
  g.addColorStop(0,'#ffffff'); g.addColorStop(0.55,'#f0f0f0'); g.addColorStop(1,'#c9c9c9');
  ctx.fillStyle = g;
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  if (b.r > 7){ // seams once it's big enough to read
    ctx.strokeStyle='#cc3333'; ctx.lineWidth=1.1; ctx.globalAlpha=0.8;
    ctx.beginPath(); ctx.arc(b.x-b.r*0.2,b.y,b.r*0.7,-0.5,0.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(b.x+b.r*0.2,b.y,b.r*0.7,Math.PI-0.5,Math.PI+0.5); ctx.stroke();
    ctx.globalAlpha=1;
  }
}

function update(dt){
  if (STATE === 'WINDUP'){
    tWind += dt;
    // spawn ball at the pinned release frame
    if (!ballLive && tWind >= (RELEASE_FRAME / SP.n) * WINDUP_DUR){
      const p = pitcherTopLeft();
      releaseAt = { x: p.x + RELEASE_HAND.dx, y: p.y + RELEASE_HAND.dy };
      ballLive = true; tBall = 0;
    }
    if (ballLive) tBall += dt;
    if (tWind >= WINDUP_DUR){ STATE = 'SETTLE'; }
  } else if (STATE === 'SETTLE'){
    if (ballLive){
      tBall += dt;
      if (tBall >= BALL_DUR){ ballLive = false; tHold = 0; }
    } else {
      tHold += dt;
      if (tHold >= RESET_HOLD){ STATE='WINDUP'; tWind=0; tBall=0; ballLive=false; }
    }
  }
}

function drawHUD(){
  ctx.fillStyle='rgba(30,35,55,0.8)'; ctx.font='9px monospace'; ctx.textAlign='right';
  ctx.fillText('SPRINT 1 · E1-S1 · PITCH DELIVERY', W-6, H-6);
  if (ready < 2){
    ctx.fillStyle='#88aacc'; ctx.font='12px monospace'; ctx.textAlign='center';
    ctx.fillText('loading assets…', W/2, H/2);
  }
}

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last)/1000); last = now;
  if (ready >= 2) update(dt);
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawBall();      // ball behind pitcher early, fine for a head-on view
  drawPitcher();
  drawHUD();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
